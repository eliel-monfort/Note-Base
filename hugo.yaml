baseURL: https://note-base.emcybertrack.com/
languageCode: en-us
title: Note Base
theme: hextra

params:
  favicon: /favicon.ico
  customCSS:
    - css/custom.css
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: favicon.ico
      dark: favicon.ico
      link: /
      width: 68
      height: 34
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  page:
    width: wide
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward
  footer:
    displayPoweredBy: false
  theme:
    displayToggle: false
  externalLinkDecoration: true
  noindex: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Topics
      pageRef: /docs
      weight: 1
    - name: Tactics
      pageRef: /tactics
      weight: 2
    - name: Tools
      pageRef: /tools
      weight: 3
    - name: Insights
      pageRef: /insights
      weight: 4
    - name: About
      pageRef: /about
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/eliel-monfort/"
      params:
        icon: github
    - name: Discord
      weight: 8
      url: "https://discord.gg/hextra"
      params:
        icon: discord
  sidebar:
    - name: More
      params:
        type: separator
      weight: 1
    - name: "About"
      pageRef: "/about"
      weight: 2
    - name: "Hugo Docs ↗"
      url: "https://gohugo.io/documentation/"
      weight: 3